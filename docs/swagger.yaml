basePath: /
definitions:
  handlers.APIJobCreated:
    properties:
      job_id:
        type: string
    type: object
  handlers.APIJobStatus:
    properties:
      job_id:
        type: string
      message:
        type: string
      report_slug:
        type: string
      status:
        type: string
      step:
        type: integer
      total_steps:
        type: integer
    type: object
  handlers.APIReportPayload:
    properties:
      complexity_score:
        type: integer
      critical_gaps:
        items:
          type: string
        type: array
      databases:
        items:
          type: string
        type: array
      est_rps:
        type: integer
      framework:
        type: string
      generated_files:
        items:
          type: string
        type: array
      language:
        type: string
      language_version:
        type: string
      min_cpu:
        type: number
      min_ram_mb:
        type: integer
      platforms:
        items: {}
        type: array
      readiness_score:
        type: integer
      readiness_summary:
        type: string
      rec_ram_mb:
        type: integer
      resource_reasoning:
        type: string
      security_score:
        type: integer
      slug:
        type: string
      storage_gb:
        type: integer
      suggestions:
        items:
          type: string
        type: array
      url:
        type: string
      warnings:
        items:
          type: string
        type: array
    type: object
  handlers.ErrorResponse:
    properties:
      error:
        example: invalid or missing API key
        type: string
    type: object
  handlers.HealthResponse:
    properties:
      postgres:
        example: ok
        type: string
      redis:
        example: ok
        type: string
      status:
        example: ok
        type: string
      version:
        example: dev
        type: string
    type: object
host: localhost:8080
info:
  contact:
    name: Deployable
  description: Deployment Readiness Platform — Phase 1 (Foundation) API surface. Endpoints
    marked 501 are intentional stubs; full implementations land in later phases (see
    the description on each operation for which phase).
  title: Deployable API
  version: 0.1.0-phase1
paths:
  /:
    get:
      description: Public marketing landing page. Signed-in visitors are redirected
        to /dashboard instead — the marketing page has nothing for them and shouldn't
        be reachable once logged in.
      produces:
      - text/html
      responses:
        "200":
          description: HTML page
          schema:
            type: string
        "303":
          description: Signed in — redirects to /dashboard
          schema:
            type: string
      summary: Landing page
      tags:
      - web
  /account/api-key:
    post:
      description: Requires a session_id cookie. Creates a new random API key for
        the CLI, invalidating any previous one, and returns an HTML partial showing
        it once — it is never displayed again after this response. Lands on the /analyze
        page's CLI section.
      produces:
      - text/html
      responses:
        "200":
          description: HTML partial with the raw key
          schema:
            type: string
        "303":
          description: No valid session — redirects to /login
          schema:
            type: string
      summary: Generate (or regenerate) an API key
      tags:
      - web
  /account/github/accounts/{id}:
    delete:
      description: Requires a session cookie and ownership. Any connected_repos entries
        added through this account are removed too (they can't be scanned via it anymore);
        reports already generated from them are untouched (a different table, unaffected
        by this).
      parameters:
      - description: github_accounts row ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: Disconnected
          schema:
            type: string
        "404":
          description: Unknown account, or not the owner
          schema:
            type: string
      summary: Disconnect a GitHub account
      tags:
      - web
  /account/github/repos:
    get:
      description: Requires a session cookie and ownership of the account. Lists that
        account's repos from the GitHub API, most recently updated first, marking
        which are already on the watchlist.
      parameters:
      - description: github_accounts row ID to browse
        in: query
        name: account
        required: true
        type: string
      - description: Page number, 1-indexed
        in: query
        name: page
        type: integer
      produces:
      - text/html
      responses:
        "200":
          description: HTML partial
          schema:
            type: string
      summary: Browse one connected GitHub account's repositories
      tags:
      - web
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Requires a session cookie. Adds (or refreshes, if already added)
        a repo on the caller's connected-repos watchlist under the given account —
        this only tracks it, it doesn't scan it. Trusts the client-supplied repo metadata
        (matching the picker it came from) rather than re-verifying against GitHub,
        since the watchlist is a personal list scoped to the caller and scanning always
        re-validates against the real repo anyway.
      parameters:
      - description: github_accounts row ID this repo was browsed under
        in: formData
        name: account_id
        required: true
        type: string
      - description: GitHub's numeric repository ID
        in: formData
        name: github_id
        required: true
        type: integer
      - description: owner/repo
        in: formData
        name: full_name
        required: true
        type: string
      - description: Whether the repo is private
        in: formData
        name: private
        type: boolean
      - description: Default branch name
        in: formData
        name: default_branch
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: 'HTML partial: the toggle button, now in Remove state'
          schema:
            type: string
      summary: Add a repository to your watchlist
      tags:
      - web
  /account/github/repos/{id}:
    delete:
      description: Requires a session cookie and ownership. Removes the watchlist
        entry only — any reports already generated from this repo are untouched. With
        ?render=button (used by the repo picker), re-renders the same toggle button
        in "Add" state using the repo metadata passed as query params, instead of
        the default empty response (used by the dashboard's connected-repos list,
        where the row is simply removed).
      parameters:
      - description: connected_repos row ID
        in: path
        name: id
        required: true
        type: string
      - description: Set to 'button' to get the re-rendered Add button instead of
          an empty response
        in: query
        name: render
        type: string
      - description: github_accounts row ID (only used with render=button)
        in: query
        name: account_id
        type: string
      - description: GitHub's numeric repository ID (only used with render=button)
        in: query
        name: github_id
        type: integer
      - description: owner/repo (only used with render=button)
        in: query
        name: full_name
        type: string
      - description: Whether the repo is private (only used with render=button)
        in: query
        name: private
        type: boolean
      - description: Default branch name (only used with render=button)
        in: query
        name: default_branch
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: Empty, or the toggle button in Add state (see render param)
          schema:
            type: string
        "404":
          description: Unknown watchlist entry, or not the owner
          schema:
            type: string
      summary: Remove a repository from your watchlist
      tags:
      - web
  /analyze:
    get:
      description: Public, rate-limited input page for starting an analysis (zip upload;
        GitHub/CLI tabs land in Phase 3/4). Works for anonymous visitors — if a session
        cookie is present the resulting job/report is attributed to that user. Logged-in
        visitors get the dashboard's sidebar shell instead of the marketing nav.
      produces:
      - text/html
      responses:
        "200":
          description: HTML page
          schema:
            type: string
      summary: Analyze page
      tags:
      - web
  /analyze/{jobID}/processing:
    get:
      description: Renders the live-progress page for a running job; the page itself
        polls GET /analyze/{jobID}/status every 2 seconds via HTMX.
      parameters:
      - description: Analysis job ID
        in: path
        name: jobID
        required: true
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: HTML page
          schema:
            type: string
        "404":
          description: Unknown job
          schema:
            type: string
      summary: Analysis processing page
      tags:
      - web
  /analyze/{jobID}/status:
    get:
      description: HTMX polling target — returns an HTML partial reflecting current
        progress. Once the job completes, responds with an HX-Redirect header pointing
        at the report page instead of a body.
      parameters:
      - description: Analysis job ID
        in: path
        name: jobID
        required: true
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: Progress partial, or HX-Redirect to /report/{slug}?new=1 once
            complete
          schema:
            type: string
        "404":
          description: Unknown job
          schema:
            type: string
      summary: Poll analysis job status
      tags:
      - web
  /analyze/github:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Parses a github.com/owner/repo URL, fetches repo metadata, and
        downloads its default-branch zipball (max 100MB by default, same limit and
        cap as direct ZIP upload). Public repos work with no account; private repos
        require the requester to have connected GitHub via GET /auth/github/connect.
        Kicks off the same analysis pipeline as the ZIP upload path.
      parameters:
      - description: GitHub repository URL, e.g. github.com/owner/repo
        in: formData
        name: url
        required: true
        type: string
      responses:
        "200":
          description: HX-Redirect header points to /analyze/{jobID}/processing
          schema:
            type: string
        "400":
          description: Invalid URL or corrupted archive
          schema:
            type: string
        "404":
          description: Repository not found or not accessible — connect GitHub for
            private repos
          schema:
            type: string
        "413":
          description: Repository archive exceeds the configured upload limit
          schema:
            type: string
        "429":
          description: GitHub API rate limit exceeded
          schema:
            type: string
      summary: Submit a project via a GitHub repository URL
      tags:
      - web
  /analyze/zip:
    post:
      consumes:
      - multipart/form-data
      description: Validates and extracts the uploaded zip (max 100MB by default,
        configurable via MAX_UPLOAD_BYTES; zip-slip protected), creates an analysis
        job, and kicks off the analysis pipeline in the background. Responds with
        an HX-Redirect header to the processing page rather than a body — the client
        (HTMX) follows it as a full navigation.
      parameters:
      - description: Project source as a .zip archive
        in: formData
        name: file
        required: true
        type: file
      responses:
        "200":
          description: HX-Redirect header points to /analyze/{jobID}/processing
          schema:
            type: string
        "400":
          description: Missing file or wrong extension
          schema:
            type: string
        "413":
          description: File exceeds the configured upload limit
          schema:
            type: string
      summary: Submit a project as a ZIP upload
      tags:
      - web
  /api/v1/analyze:
    post:
      consumes:
      - multipart/form-data
      description: Requires an X-API-Key header. Accepts the same multipart .zip upload
        as the web /analyze/zip endpoint (max 100MB by default, configurable via MAX_UPLOAD_BYTES)
        and kicks off the same analysis pipeline, attributed to the API key's owner.
        Subject to Redis-backed rate limiting (default 5/hour).
      parameters:
      - description: Project source as a .zip archive
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/handlers.APIJobCreated'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "413":
          description: Request Entity Too Large
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Submit a project as a ZIP upload
      tags:
      - api
  /api/v1/analyze/{jobID}:
    get:
      description: Requires an X-API-Key header. Polls the same Redis-backed progress
        state the web processing page uses. Once status is "complete", report_slug
        is set — fetch the full result from GET /api/v1/report/{slug}.
      parameters:
      - description: Analysis job ID
        in: path
        name: jobID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.APIJobStatus'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get analysis job status
      tags:
      - api
  /api/v1/report/{slug}:
    get:
      description: Requires an X-API-Key header. Returns the same data as the web
        report page (/report/{slug}) in a machine-readable shape — used by the CLI
        to render its terminal summary.
      parameters:
      - description: Report slug
        in: path
        name: slug
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.APIReportPayload'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get a report as JSON
      tags:
      - api
  /auth/github:
    get:
      description: Redirects to GitHub's OAuth authorize page. Sets a short-lived
        oauth_state cookie for CSRF protection, checked on callback.
      responses:
        "303":
          description: Redirects to github.com/login/oauth/authorize
          schema:
            type: string
      summary: Start GitHub sign-in
      tags:
      - auth
  /auth/github/callback:
    get:
      description: Exchanges the code for a token, fetches the GitHub profile (id,
        login, primary verified email), links-or-creates the account by GitHub ID
        — falling back to matching an existing account by email — trusts the provider-verified
        email, creates a session, and redirects to /analyze.
      parameters:
      - description: Authorization code from GitHub
        in: query
        name: code
        required: true
        type: string
      - description: CSRF state, must match the oauth_state cookie
        in: query
        name: state
        required: true
        type: string
      responses:
        "303":
          description: Redirects to /login?oauth_error=1 on failure
          schema:
            type: string
      summary: GitHub OAuth callback
      tags:
      - auth
  /auth/github/connect:
    get:
      description: Requires an active session (see RequireAuth). Redirects to GitHub's
        OAuth authorize page requesting `repo` scope — broader than the read:user/user:email
        scope used for sign-in — so the resulting token can download private repository
        archives. GitHubOAuthCallback encrypts it (AES-256-GCM, ENCRYPTION_KEY) and
        adds it as a connected account (a user can connect more than one — reconnecting
        the same GitHub account refreshes its token rather than adding a duplicate).
      parameters:
      - description: Local path to redirect back to after connecting (default /analyze)
        in: query
        name: return_to
        type: string
      responses:
        "303":
          description: Redirects to github.com/login/oauth/authorize
          schema:
            type: string
      summary: Connect a GitHub account for private repository access
      tags:
      - analyze
  /auth/google:
    get:
      description: Redirects to Google's OAuth consent page. Sets a short-lived oauth_state
        cookie for CSRF protection, checked on callback.
      responses:
        "303":
          description: Redirects to accounts.google.com/o/oauth2/auth
          schema:
            type: string
      summary: Start Google sign-in
      tags:
      - auth
  /auth/google/callback:
    get:
      description: Exchanges the code for a token, fetches the Google profile (sub,
        verified email, name), links-or-creates the account by Google ID — falling
        back to matching an existing account by email — trusts the provider-verified
        email, creates a session, and redirects to /analyze.
      parameters:
      - description: Authorization code from Google
        in: query
        name: code
        required: true
        type: string
      - description: CSRF state, must match the oauth_state cookie
        in: query
        name: state
        required: true
        type: string
      responses:
        "303":
          description: Redirects to /login?oauth_error=1 on failure
          schema:
            type: string
      summary: Google OAuth callback
      tags:
      - auth
  /dashboard:
    get:
      description: 'Requires a session cookie. Three sections in one shell, switched
        via ?tab= (or in-page via the sidebar, no navigation): "dashboard" (default)
        is the stats/connected-repos overview, "analyze" embeds the same analyze-form
        the standalone /analyze page uses, "reports" is the searchable, paginated
        report list. Requests carrying the HX-Request header (search/pagination within
        Reports) get just the results partial; everything else gets the full page.'
      parameters:
      - description: Filter by source, language, or framework (Reports section)
        in: query
        name: search
        type: string
      - description: Page number, 1-indexed (Reports section)
        in: query
        name: page
        type: integer
      - description: '''analyze'' or ''reports'' shows that section; anything else
          (default) shows the overview'
        in: query
        name: tab
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: HTML page or partial
          schema:
            type: string
        "303":
          description: No valid session — redirects to /login
          schema:
            type: string
      summary: Dashboard — your reports
      tags:
      - web
  /dashboard/repos/{id}:
    get:
      description: Requires a session cookie and ownership of the watchlist entry.
        Shows the repo's metadata and every report ever generated for it (not just
        the most recent, unlike the flat Reports list).
      parameters:
      - description: connected_repos row ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: HTML page
          schema:
            type: string
        "404":
          description: Unknown watchlist entry, or not the owner
          schema:
            type: string
      summary: One connected repo's details and report history
      tags:
      - web
  /forgot-password:
    get:
      produces:
      - text/html
      responses:
        "200":
          description: HTML form
          schema:
            type: string
      summary: Forgot-password form
      tags:
      - auth
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Always responds with the same generic notice regardless of whether
        the email is registered, to avoid account enumeration. If it is, a single-use
        reset link (1-hour expiry) is emailed.
      parameters:
      - description: Email address
        in: formData
        name: email
        required: true
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: Generic confirmation notice
          schema:
            type: string
      summary: Request a password reset link
      tags:
      - auth
  /health:
    get:
      description: Pings Postgres and Redis and reports overall status. Used by Docker
        healthchecks and uptime monitoring.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.HealthResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/handlers.HealthResponse'
      summary: Health check
      tags:
      - system
  /login:
    get:
      parameters:
      - description: Set to 1 after successful email verification, shows a confirmation
          notice
        in: query
        name: verified
        type: string
      - description: Set to 1 after a successful password reset, shows a confirmation
          notice
        in: query
        name: reset
        type: string
      - description: Set to 1 when GitHub/Google sign-in fails or is not configured,
          shows an error
        in: query
        name: oauth_error
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: HTML form
          schema:
            type: string
      summary: Login form
      tags:
      - auth
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Validates credentials against the stored bcrypt hash, then requires
        the account's email to be verified. On success creates a session, sets the
        session_id cookie, records last_login_at, and emails a welcome message the
        first time this succeeds for the account. On failure re-renders the login
        form with a generic error — no session is created and which field was wrong
        is never disclosed.
      parameters:
      - description: Email address
        in: formData
        name: email
        required: true
        type: string
      - description: Password
        in: formData
        name: password
        required: true
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: Invalid credentials or unverified email — form re-rendered
            with error, no session created
          schema:
            type: string
        "303":
          description: 'Redirects to /analyze; Set-Cookie: session_id=...'
          schema:
            type: string
      summary: Sign in
      tags:
      - auth
  /logout:
    post:
      description: Deletes the session from Postgres and Redis, clears the session_id
        cookie (Max-Age=0), and redirects to /login. Requires a session_id cookie.
      responses:
        "303":
          description: Redirects to /login; cookie cleared
          schema:
            type: string
      summary: Sign out
      tags:
      - auth
  /register:
    get:
      produces:
      - text/html
      responses:
        "200":
          description: HTML form
          schema:
            type: string
      summary: Registration form
      tags:
      - auth
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Validates name/email/password (min 8 chars, must match confirm_password),
        bcrypt-hashes the password (cost 12), and creates an unverified user. Does
        NOT create a session — a 6-digit OTP is emailed and the user is redirected
        to /verify-email; login is blocked until the OTP is confirmed. Duplicate emails
        and validation failures re-render the form with 200 and an inline error.
      parameters:
      - description: Full name
        in: formData
        name: name
        required: true
        type: string
      - description: Email address
        in: formData
        name: email
        required: true
        type: string
      - description: Password, minimum 8 characters
        in: formData
        name: password
        required: true
        type: string
      - description: Must match password
        in: formData
        name: confirm_password
        required: true
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: Validation failed or email already registered — form re-rendered
            with error
          schema:
            type: string
        "303":
          description: Redirects to /verify-email?email=...
          schema:
            type: string
      summary: Create an account
      tags:
      - auth
  /report/{slug}:
    delete:
      description: Requires a session cookie and ownership of the report. A report
        that doesn't exist and one that isn't yours are indistinguishable (both 404)
        to avoid leaking which slugs exist.
      parameters:
      - description: Report slug
        in: path
        name: slug
        required: true
        type: string
      responses:
        "200":
          description: Deleted
          schema:
            type: string
        "404":
          description: Unknown report, or not the owner
          schema:
            type: string
      summary: Delete a report
      tags:
      - web
    get:
      description: Renders the deployment readiness report for a public slug. Anyone
        can view the score and detected stack; the full report (findings, resources,
        platforms, files) requires being logged in — as any user, not just the report's
        owner, so shared links still work between registered users. Anonymous-submitted
        reports expire after 7 days; logged-in users' reports are permanent. Owners
        additionally see rescan (GitHub-sourced only) and delete actions.
      parameters:
      - description: Report slug
        in: path
        name: slug
        required: true
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: HTML report page
          schema:
            type: string
        "404":
          description: Unknown or expired report
          schema:
            type: string
      summary: View an analysis report
      tags:
      - web
  /report/{slug}/download:
    get:
      description: Zips the report's generated_files (Dockerfile, docker-compose.yml,
        .env.example, CI workflow, DEPLOYMENT.md, and platform config where applicable)
        and streams it as an attachment. Requires being logged in (as any user, same
        rule as viewing the full report) — no additional ownership check beyond that.
      parameters:
      - description: Report slug
        in: path
        name: slug
        required: true
        type: string
      produces:
      - application/zip
      responses:
        "200":
          description: deployable-<slug>.zip
          schema:
            type: file
        "401":
          description: Sign in to download
          schema:
            type: string
        "404":
          description: Unknown/expired report, or no generated files
          schema:
            type: string
      summary: Download a report's generated deployment files
      tags:
      - web
  /report/{slug}/rescan:
    post:
      description: Requires a session cookie and ownership of the report. Only GitHub-sourced
        reports can be rescanned (re-fetching a URL is cheap and idempotent) — ZIP-sourced
        reports aren't, since the original upload isn't retained after analysis. Re-fetches
        the same repository and kicks off a fresh analysis job, identical to submitting
        the URL again.
      parameters:
      - description: Report slug
        in: path
        name: slug
        required: true
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: HX-Redirect header points to /analyze/{jobID}/processing
          schema:
            type: string
        "403":
          description: Not the owner, or not a GitHub-sourced report
          schema:
            type: string
        "404":
          description: Unknown report
          schema:
            type: string
        "429":
          description: Rate limit exceeded
          schema:
            type: string
      summary: Re-run analysis for a GitHub-sourced report
      tags:
      - web
  /resend-otp:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Issues and emails a new OTP, subject to a 60-second cooldown since
        the last one. Always responds with the same generic notice regardless of whether
        the account exists or is already verified, to avoid leaking account state.
      parameters:
      - description: Email address to resend the code to
        in: formData
        name: email
        required: true
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: Verify-email form re-rendered with a notice
          schema:
            type: string
      summary: Resend the verification code
      tags:
      - auth
  /reset-password:
    get:
      description: Validates the token from the emailed link before showing the new-password
        form.
      parameters:
      - description: Password reset token
        in: query
        name: token
        required: true
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: HTML form, or an invalid/expired notice
          schema:
            type: string
      summary: Reset-password form
      tags:
      - auth
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Validates the single-use token and that password matches confirm_password,
        updates the bcrypt hash (cost 12), consumes the token, and deletes every existing
        session for the account (forcing re-authentication everywhere) before redirecting
        to /login.
      parameters:
      - description: Password reset token
        in: formData
        name: token
        required: true
        type: string
      - description: New password, minimum 8 characters
        in: formData
        name: password
        required: true
        type: string
      - description: Must match password
        in: formData
        name: confirm_password
        required: true
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: Invalid/expired token or validation error — form re-rendered
          schema:
            type: string
        "303":
          description: Redirects to /login?reset=1
          schema:
            type: string
      summary: Set a new password
      tags:
      - auth
  /verify-email:
    get:
      description: Shows the OTP entry form for the email address passed as a query
        param.
      parameters:
      - description: Email address to verify
        in: query
        name: email
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: HTML form
          schema:
            type: string
      summary: Email verification form
      tags:
      - auth
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Validates the 6-digit code against the most recently issued OTP
        for the account (15-minute expiry, 5 attempt limit). On success marks the
        account verified and redirects to /login. Does not create a session — the
        user still needs to sign in.
      parameters:
      - description: Email address being verified
        in: formData
        name: email
        required: true
        type: string
      - description: 6-digit code from the verification email
        in: formData
        name: code
        required: true
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: Invalid, expired, or locked code — form re-rendered with error
          schema:
            type: string
        "303":
          description: Redirects to /login?verified=1
          schema:
            type: string
      summary: Confirm the OTP sent at registration
      tags:
      - auth
schemes:
- http
- https
securityDefinitions:
  ApiKeyAuth:
    description: Per-user API key (Phase 4 issues these). SHA-256 hash is checked
      against users.api_key_hash. Session-cookie-protected web routes (/analyze, /dashboard,
      /logout) are documented per-operation since Swagger 2.0 has no cookie security
      scheme.
    in: header
    name: X-API-Key
    type: apiKey
swagger: "2.0"
