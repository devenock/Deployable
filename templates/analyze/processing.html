{{define "analyze-processing"}}
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
{{template "head" .}}
</head>
<body class="bg-editor-bg text-gray-100 min-h-screen font-sans antialiased">
{{if .User}}
{{template "app-sidebar" .}}
<div class="sm:pl-64">
  {{template "app-topbar" .}}
{{else}}
{{template "nav" .}}
{{end}}

<section class="relative overflow-hidden min-h-[calc(100vh-3.5rem)] flex items-center">
  <div class="absolute inset-0 bg-grid -z-10"></div>
  <div class="glow -z-10 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 h-72 w-72 bg-brand/15"></div>

  <div class="w-full max-w-lg mx-auto px-4 py-16">
    <div class="text-center">
      <h1 class="fade-up text-2xl font-semibold text-white">Analyzing your project</h1>
      <p class="fade-up mt-1.5 text-sm text-gray-400 [animation-delay:60ms]">This usually takes under a minute.</p>
    </div>

    <div class="fade-up mt-7 rounded-xl border border-editor-border bg-editor-card/90 backdrop-blur-sm p-6 sm:p-8 shadow-2xl shadow-black/40 [animation-delay:120ms]">
      <div id="status-container"
           hx-get="/analyze/{{.JobID}}/status"
           hx-trigger="every 2s"
           hx-swap="innerHTML"
           hx-target="#status-container">
        {{template "analyze-steps" .}}
      </div>
    </div>
  </div>
</section>
{{if .User}}
</div>
{{end}}
</body>
</html>
{{end}}
