{{define "forgot-password"}}
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
{{template "head" .}}
</head>
<body class="bg-editor-bg text-gray-100 min-h-screen">
{{template "nav" .}}
{{template "flash" .}}

<main class="max-w-sm mx-auto px-4 py-20">
  <h1 class="text-2xl font-semibold text-white text-center">Reset your password</h1>
  <p class="mt-3 text-center text-sm text-gray-400">
    Enter your email and we'll send you a link to reset your password.
  </p>

  {{if .Notice}}
  <div class="mt-6 rounded-md border border-success/40 bg-success/10 px-4 py-3 text-sm text-success">
    {{.Notice}}
  </div>
  {{else}}
  <form method="POST" action="/forgot-password" class="mt-6 space-y-4">
    <div>
      <label class="block text-sm text-gray-400 mb-1" for="email">Email</label>
      <input type="email" id="email" name="email" required
             class="w-full rounded-md border border-editor-border bg-editor-card px-3 py-2 text-white focus:outline-none focus:ring-2 focus:ring-brand">
    </div>
    <button type="submit" class="w-full rounded-md bg-brand px-4 py-2 text-white font-medium hover:opacity-90">
      Send reset link
    </button>
  </form>
  {{end}}

  <p class="mt-6 text-center text-sm text-gray-400">
    <a href="/login" class="text-brand hover:underline">Back to sign in</a>
  </p>
</main>
</body>
</html>
{{end}}
