{{define "login"}}
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
{{template "head" .}}
</head>
<body class="bg-editor-bg text-gray-100 min-h-screen">
{{template "nav" .}}
{{template "flash" .}}

<main class="max-w-sm mx-auto px-4 py-20">
  <h1 class="text-2xl font-semibold text-white text-center">Sign in</h1>

  {{if .Error}}
  <div class="mt-6 rounded-md border border-danger/40 bg-danger/10 px-4 py-3 text-sm text-danger">
    {{.Error}}
  </div>
  {{end}}
  {{if .Notice}}
  <div class="mt-6 rounded-md border border-success/40 bg-success/10 px-4 py-3 text-sm text-success">
    {{.Notice}}
  </div>
  {{end}}

  <form method="POST" action="/login" class="mt-6 space-y-4">
    <div>
      <label class="block text-sm text-gray-400 mb-1" for="email">Email</label>
      <input type="email" id="email" name="email" required
             value="{{.Email}}"
             class="w-full rounded-md border border-editor-border bg-editor-card px-3 py-2 text-white focus:outline-none focus:ring-2 focus:ring-brand">
    </div>
    <div>
      <div class="flex items-center justify-between mb-1">
        <label class="block text-sm text-gray-400" for="password">Password</label>
        <a href="/forgot-password" class="text-xs text-brand hover:underline">Forgot password?</a>
      </div>
      <input type="password" id="password" name="password" required
             class="w-full rounded-md border border-editor-border bg-editor-card px-3 py-2 text-white focus:outline-none focus:ring-2 focus:ring-brand">
    </div>
    <button type="submit" class="w-full rounded-md bg-brand px-4 py-2 text-white font-medium hover:opacity-90">
      Sign in
    </button>
  </form>

  <div class="mt-6 flex items-center gap-3">
    <div class="h-px flex-1 bg-editor-border"></div>
    <span class="text-xs text-gray-500">or</span>
    <div class="h-px flex-1 bg-editor-border"></div>
  </div>

  <div class="mt-6 space-y-3">
    <a href="/auth/github" class="flex items-center justify-center gap-2 w-full rounded-md border border-editor-border bg-editor-card px-4 py-2 text-sm font-medium text-gray-200 hover:bg-editor-surface">
      Continue with GitHub
    </a>
    <a href="/auth/google" class="flex items-center justify-center gap-2 w-full rounded-md border border-editor-border bg-editor-card px-4 py-2 text-sm font-medium text-gray-200 hover:bg-editor-surface">
      Continue with Google
    </a>
  </div>

  <p class="mt-6 text-center text-sm text-gray-400">
    Don't have an account? <a href="/register" class="text-brand hover:underline">Create one</a>
  </p>
</main>
</body>
</html>
{{end}}
