version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: deployable_app_dev
    ports:
      - "8080:8080"
    env_file: .env
    volumes:
      - .:/app
      - deployable_uploads_dev:/app/data/uploads
      - go_mod_cache:/go/pkg/mod
    networks:
      - deployable_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: deployable_postgres_dev
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - deployable_pgdata_dev:/var/lib/postgresql/data
    networks:
      - deployable_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: deployable_redis_dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - deployable_redis_dev:/data
    networks:
      - deployable_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  deployable_network:
    driver: bridge

volumes:
  deployable_pgdata_dev:
  deployable_redis_dev:
  deployable_uploads_dev:
  go_mod_cache:
